<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donamestre PTZ Console</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="brand-container">
            <h1 class="logo">D<button id="power-trigger" class="power-btn" onclick="toggleSystemPower()" title="Mise sous tension">⏻</button>namestre</h1>
            <span class="sub-logo">PTZ AXIS-H CONTROL</span>
        </div>
        <div class="config-ip">
            <input type="text" id="esp-ip" placeholder="IP de l'ESP32 (Ex: 192.168.1.50)">
            <button onclick="saveIP()">🔌 Connexion</button>
        </div>
        <div id="status" class="status-badge disconnected">● SYSTEM SYSTEM OFF</div>
    </header>
    
    <div class="dashboard">
        <div class="card">
            <div class="monitor-wrapper">
                <div id="rec-badge">REC VIDEO</div>
                <img id="livestream" src="" alt="Système hors tension. Cliquez sur le ⏻ pour démarrer." crossorigin="anonymous">
            </div>
            <div class="action-bar">
                <button class="btn btn-primary" onclick="capturePhoto()">📸 Capture Photo</button>
                <button class="btn btn-danger" id="rec-btn" onclick="toggleRecording()">🔴 Enregistrer Flux</button>
            </div>
        </div>
        <div class="card ptz-section">
            <h3 style="margin:0; font-size:15px; color:#cbd5e1; text-transform: uppercase; letter-spacing: 1px;">Navigation Horizontale</h3>
            <div class="dpad-horizontal">
                <button class="btn-joy" onclick="sendPTZ('left')">◀ GAUCHE</button>
                <button class="btn-joy btn-home" onclick="sendPTZ('home')">⌂ CENTER</button>
                <button class="btn-joy" onclick="sendPTZ('right')">DROITE ▶</button>
            </div>
            
            <div class="settings-track">
                <div class="track-group">
                    <div class="track-label"><span>Définition Flux (JPEG)</span><span id="val-quality" class="track-val">Optimale</span></div>
                    <input type="range" class="slider" min="6" max="30" value="10" onchange="pushConfig('quality', this.value)">
                </div>
                <div class="track-group">
                    <div class="track-label"><span>Filtre de Netteté</span><span id="val-sharpness" class="track-val">Normal</span></div>
                    <input type="range" class="slider" min="-2" max="2" value="0" onchange="pushConfig('sharpness', this.value)">
                </div>
            </div>
        </div>
    </div>
    <canvas id="hidden-canvas" style="display:none;"></canvas>
    <script src="app.js"></script>
</body>
</html>
